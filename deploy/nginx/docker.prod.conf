upstream droproom {
    server web:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name droproom.com.ua www.droproom.com.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name droproom.com.ua www.droproom.com.ua;

    ssl_certificate /etc/letsencrypt/live/droproom.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/droproom.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /healthz/ {
        proxy_pass http://droproom;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://droproom;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
