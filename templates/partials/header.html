{% load static %}
<header>
  <nav class="nav">
    <div class="nav-left">
      <a href="/" class="link {% block nav_home %}{% endblock %}">Магазин</a>
      <a href="{% url 'catalog:list' %}" class="link {% block nav_catalog %}{% endblock %}">Каталог</a>
      <a href="{% url 'catalog:list' %}?brands=true" class="link">Бренди</a>
      <a href="{% url 'pages:story' %}" class="link {% block nav_story %}{% endblock %}">Про нас</a>
    </div>
    <a href="/" class="wordmark">DROP<span class="dot"></span>ROOM</a>
    <div class="nav-right">
      <a href="#" class="icon-btn" aria-label="Пошук">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="6" cy="6" r="4.5"/><path d="M9.5 9.5l3 3"/></svg>
        Пошук
      </a>
      {% if user.is_authenticated %}
        <a href="{% url 'accounts:profile' %}" class="icon-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="5" r="3"/><path d="M1.5 13c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/></svg>
          Профіль
        </a>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="icon-btn">Увійти</a>
      {% endif %}
      {% if site_settings and site_settings.telegram_support %}
        <a href="https://t.me/{{ site_settings.telegram_support|cut:'@' }}"
           class="icon-btn nav-tg"
           target="_blank" rel="noopener noreferrer"
           aria-label="Підтримка в Telegram">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
          <span class="nav-tg__label">Підтримка</span>
        </a>
      {% endif %}
      <a href="{% url 'orders:cart' %}" class="cart-pill" id="cart-count"
         hx-get="{% url 'orders:cart_count' %}" hx-trigger="every 60s" hx-swap="outerHTML">
        Кошик <span class="n">{{ cart_count|default:"0" }}</span>
      </a>
    </div>
  </nav>
</header>
