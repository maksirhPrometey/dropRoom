<aside class="stock-notice{% if stock_notice_modifier %} stock-notice--{{ stock_notice_modifier }}{% endif %}"
       role="note"
       aria-label="Важлива інформація про наявність товарів">
  <div class="stock-notice__inner">
    <div class="stock-notice__content">
      <p class="stock-notice__title">⚠️ Увага! Більшість товарів представлені лише в 1–2 екземплярах.</p>
      <p class="stock-notice__text">Якщо товар є в наявності або доступний до замовлення, рекомендуємо не відкладати покупку, адже повторне надходження може бути відсутнім.</p>
    </div>
  </div>
</aside>
