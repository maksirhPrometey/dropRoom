<a href="{% url 'orders:cart' %}" class="cart-pill" id="cart-count"
   hx-get="{% url 'orders:cart_count' %}" hx-trigger="every 60s" hx-swap="outerHTML"
   aria-label="Кошик">
  <svg class="cart-pill__icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
    <path d="M1 1h1.5l1.2 6.2a1.5 1.5 0 001.5 1.2h5.8a1.5 1.5 0 001.5-1.2l1-5.2H3.2"/>
    <circle cx="5.5" cy="12" r="1"/>
    <circle cx="10.5" cy="12" r="1"/>
  </svg>
  <span class="cart-pill__label">Кошик</span>
  <span class="n{% if cart_updated %} is-updated{% endif %}">{{ cart_count|default:"0" }}</span>
</a>
